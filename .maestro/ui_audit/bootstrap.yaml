appId: com.pharmascan.app
tags:
  - ui_audit
---
- launchApp:
    clearState: true
    # WHY: Starting fresh triggers DB download/parsing. This takes time.

# Handle Permissions (Android 13+ / iOS)
- runFlow:
    when:
      visible: "Autoriser"
    commands:
      - tapOn: "Autoriser"
- runFlow:
    when:
      visible: "Allow"
    commands:
      - tapOn: "Allow"
- runFlow:
    when:
      visible: "While using the app"
    commands:
      - tapOn: "While using the app"

# Wait for Data Initialization (Loading Screen -> Main Screen)
# WHY: Parsing BDPM files is CPU intensive. We give it 60s.
- extendedWaitUntil:
    visible: "Scanner"
    timeout: 60000 
- takeScreenshot: screenshots/bootstrap-ready
