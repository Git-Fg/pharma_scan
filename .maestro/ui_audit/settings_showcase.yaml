appId: com.pharmascan.app
tags:
  - ui_audit
---
- tapOn: "Ouvrir les réglages"
- extendedWaitUntil:
    visible: "Réglages"
    timeout: 5000
- takeScreenshot: screenshots/settings-view

# Toggle Theme
- tapOn: "Thème sombre"
- delay: 500
- tapOn: "Thème clair"

# Test Sync Check (Manual)
- tapOn: "Vérifier les mises à jour maintenant"
# Wait for toast or completion (approximate)
- delay: 3000 

# Test Reset Dialog (But Cancel)
- scrollUntilVisible:
    element:
      text: "Forcer la réinitialisation de la base"
    direction: DOWN
- tapOn: "Forcer la réinitialisation de la base"
- extendedWaitUntil:
    visible: "Réinitialiser la base de données ?"
    timeout: 2000
- tapOn: "Annuler"

- back
