appId: com.pharmascan.app
tags:
  - ui_audit
---
# Navigate to Explorer
- tapOn: "Explorer"
- extendedWaitUntil:
    visible: "Rechercher par nom, CIP, ou principe actif"
    timeout: 5000

# Perform Search
- tapOn: "Rechercher par nom, CIP, ou principe actif"
- inputText: ${SEARCH_QUERY}
- pressKey: Enter
- hideKeyboard

# Wait for fuzzy search results
- extendedWaitUntil:
    visible: "Génériques"
    timeout: 10000
- takeScreenshot: screenshots/explorer-search-results

# Open a Group Detail
# Tapping the first "Princeps" badge or card it finds
- tapOn: "Princeps" 
- runFlow:
    when:
      visible: "Thérapies Associées"
    commands:
      - extendedWaitUntil:
          visible: "Thérapies Associées"
          timeout: 10000
- takeScreenshot: screenshots/explorer-group-details

# Go Back and Clear
- back
- tapOn: "Effacer la recherche"
- extendedWaitUntil:
    visible: "Cluster"
    timeout: 5000
