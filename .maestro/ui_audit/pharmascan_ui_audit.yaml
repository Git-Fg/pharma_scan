appId: com.pharmascan.app
tags:
  - ui_audit
env:
  SEARCH_QUERY: doliprane
---
- runFlow: bootstrap.yaml
- startRecording:
    path: ../output/ui_audit
    label: 'UI audit capture'
- runFlow: scanner_showcase.yaml
- runFlow: explorer_showcase.yaml
- runFlow: settings_showcase.yaml
- stopRecording
- takeScreenshot: screenshots/ui-audit-finished
- stopApp

