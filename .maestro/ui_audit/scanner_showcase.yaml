appId: com.pharmascan.app
tags:
  - ui_audit
---
# Ensure we are on Scanner tab
- tapOn: 
    text: "Scanner"
    retryTapIfNoChange: false
    optional: true

# Toggle Camera UI
- tapOn: "Scanner un code"
- extendedWaitUntil:
    visible: "Arrêter le scan"
    timeout: 5000
- takeScreenshot: screenshots/scanner-active

# Open Gallery Sheet (and close)
- tapOn: "Galerie"
- extendedWaitUntil:
    visible: "Choisir une photo"
    timeout: 5000
- tapOn: "Annuler"

# Manual Entry Flow
- tapOn: "Saisie"
- extendedWaitUntil:
    visible: "Saisie manuelle du CIP"
    timeout: 5000
# Input a valid CIP structure (13 digits)
- inputText: "3400930302613" 
- tapOn: "Rechercher"
# Close the sheet or result
- tapOn: "Fermer"
