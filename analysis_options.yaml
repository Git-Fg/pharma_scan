# This file configures the analyzer, which statically analyzes Dart code to
# check for errors, warnings, and lints.
#
# The following line activates a set of recommended lints for Flutter apps,
# packages, and plugins designed to encourage good coding practices.
include: package:flutter_lints/flutter.yaml

linter:
  rules:
    # --- PERFORMANCE & FLUTTER ---
    - prefer_const_constructors
    - prefer_const_constructors_in_immutables
    - prefer_const_literals_to_create_immutables
    - use_colored_box
    - use_decorated_box
    - sized_box_for_whitespace
    - sized_box_shrink_expand
    - sort_child_properties_last

    # --- MODERN SYNTAX (Dart 3+) ---
    - unnecessary_new
    - unnecessary_const
    - unnecessary_this
    - unnecessary_late
    - use_super_parameters
    - prefer_if_null_operators
    - prefer_conditional_assignment
    - unnecessary_lambdas

    # --- CLEANUP & CONSISTENCY ---
    - unnecessary_string_interpolations
    - unnecessary_brace_in_string_interps
    - unnecessary_parenthesis
    - unnecessary_await_in_return
    - prefer_is_empty
    - prefer_is_not_empty
    - avoid_print
    - prefer_single_quotes

    # --- TIER 1 RULES (AI-Optimized: Signal > Noise) ---
    - avoid_dynamic_calls
    - unawaited_futures

    # --- TIER 3 RULES DISABLED (Reduce Noise) ---
    # - lines_longer_than_80_chars  # Disabled for AI optimization
    # - sort_constructors_first      # Disabled for AI optimization

analyzer:
  exclude:
    - "**/*.g.dart"
    - "**/*.freezed.dart"
    - "**/*.drift.dart"
    - "tool/**"  # Exclude tool scripts from analysis (allow print statements)
  language:
    strict-casts: true
    strict-inference: true
    strict-raw-types: true
  enable-experiment:
    - dot-shorthands  # Required for Mix 2.0 dot notation syntax (Dart SDK ≥ 3.9.0)
  errors:
    avoid_print: error
    unused_import: warning
    dead_code: warning
